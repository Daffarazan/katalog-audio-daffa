<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Setup & Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased relative selection:bg-indigo-500 selection:text-white">

    <div class="glow-bg"></div>

    <header class="max-w-3xl mx-auto pt-24 pb-16 px-6 text-center slide-up">
        <span class="inline-block py-1 px-3 rounded-full bg-indigo-500/10 text-indigo-400 text-sm font-semibold mb-4 border border-indigo-500/20">
            Welcome to my space
        </span>
        <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">
            Halo, saya <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Daffa</span>.
        </h1>
        <p class="text-lg text-slate-400 max-w-xl mx-auto leading-relaxed">
            UI/UX Enthusiast & Audio Gear Lover. Menggabungkan desain antarmuka yang intuitif dengan pengalaman audio yang imersif.
        </p>
    </header>

    <main class="max-w-3xl mx-auto px-6 pb-24">
        <section class="mb-16 slide-up" style="animation-delay: 100ms;">
            <div class="flex items-center gap-3 mb-8 border-b border-slate-800 pb-4">
                <span class="text-2xl">🎧</span>
                <h2 class="text-2xl font-semibold text-slate-100">Setup Audio Harian</h2>
            </div>
            
            <div id="wadah-katalog" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <p class="text-slate-400 text-sm">Sedang memuat data dari database...</p>
            </div>
        </section>
    </main>

    <div id="popup-review" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50 transition-opacity">
        <div class="bg-[#131722] border border-slate-700 rounded-2xl p-8 max-w-md w-full modal-masuk shadow-2xl relative">
            <button onclick="tutupPopup()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h3 id="judul-popup" class="text-2xl font-bold text-white mb-4">Judul</h3>
            <p id="isi-popup" class="text-slate-400 leading-relaxed mb-8">Isi review panjang akan muncul di sini...</p>
            <button onclick="tutupPopup()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 rounded-xl transition-colors">
                Tutup Review
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
